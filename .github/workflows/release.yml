# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean --config .goreleaser.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  flatpak:
    if: vars.BUILD_FLATPAK == 'true'
    runs-on: ubuntu-latest
    needs: goreleaser
    steps:
      - uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder
          flatpak remote-add --user --if-not-exists flathub \
            https://flathub.org/repo/flathub.flatpakrepo
          flatpak install --user -y --noninteractive flathub \
            org.freedesktop.Platform//24.08 \
            org.freedesktop.Sdk//24.08

      - name: Resolve Flatpak settings
        run: |
          manifest="${{ vars.FLATPAK_MANIFEST }}"
          app_id="${{ vars.FLATPAK_APP_ID }}"
          if [ -z "$manifest" ]; then manifest="flatpak/io.github.marang.Franz.yml"; fi
          if [ -z "$app_id" ]; then app_id="io.github.marang.Franz"; fi
          if [ ! -f "$manifest" ]; then
            echo "Flatpak manifest not found: $manifest"
            exit 1
          fi
          echo "manifest=$manifest" >> "$GITHUB_ENV"
          echo "app_id=$app_id" >> "$GITHUB_ENV"

      - name: Build franz-agent binary for Flatpak
        run: go build -o flatpak/franz-agent .

      - name: Build Flatpak repo
        run: |
          flatpak-builder --user --force-clean --repo=repo builddir \
            "$manifest"

      - name: Build Flatpak bundle
        run: |
          flatpak build-bundle repo franz-agent.flatpak "$app_id" \
            --runtime-repo=https://flathub.org/repo/flathub.flatpakrepo

      - name: Upload Flatpak artifact
        uses: actions/upload-artifact@v4
        with:
          name: franz-agent-flatpak
          path: franz-agent.flatpak

      - name: Upload Flatpak to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: franz-agent.flatpak
