app-id: io.github.marang.Franz
runtime: org.freedesktop.Platform
runtime-version: "24.08"
sdk: org.freedesktop.Sdk
command: franz-agent

finish-args:
  - --share=network
  - --filesystem=home

modules:
  - name: franz-agent
    buildsystem: simple
    build-commands:
      - install -D franz-agent /app/bin/franz-agent
    sources:
      - type: file
        path: franz-agent
